services:
  postgres:
    container_name: lanpass_postgres
    build: ./database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/admin-panel-db/init.sql:/docker-entrypoint-initdb.d/init-admin-panel.sql
    networks:
      - backend_net
    restart: always

  pgadmin:
    container_name: lanpass_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?}
      PGADMIN_LISTEN_PORT: 2222
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
    networks:
      - backend_net
    restart: always

  backend:
    container_name: lanpass_backend
    build: ./backend
    environment:
      DB_HOST: lanpass_postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:?}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?}
      DB_NAME: ${POSTGRES_DB:?}
      JWT_SECRET: ${JWT_SECRET:?}
      ADMIN_LOGIN: ${ADMIN_LOGIN:?}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      ROOT_API_TOKEN: ${ROOT_API_TOKEN:?}
      ROOT_API_URL: ${ROOT_API_URL:?}
      SYNC_INTERVAL_HOURS: ${BACKEND_AUTOUPDATE:?}
      PORT: ${BACKEND_PORT:-8080}
    networks:
      - backend_net
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    container_name: lanpass_frontend
    build:
      context: ./frontend
      args:
        VITE_APP_PHONE: ${PHONE:?}
        BACKEND_DOMAIN: lanpass_backend
        BACKEND_PORT: ${BACKEND_PORT:-8080}
        API_PATTERN: api
    networks:
      - frontend_net
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    container_name: lanpass_nginx
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres:
  pgadmin: