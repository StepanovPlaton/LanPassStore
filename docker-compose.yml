services:
  postgres:
    container_name: lanpass_postgres
    image: docker.io/postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init-admin-panel.sql
    networks:
      - backend_net
    restart: always

  backend:
    container_name: lanpass_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:?}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?}
      DB_NAME: ${POSTGRES_DB:?}
      SECRET: ${SECRET:?}
      ADMIN_LOGIN: ${ADMIN_LOGIN:?}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      ROOT_API_TOKEN: ${ROOT_API_TOKEN:?}
      ROOT_API_URL: ${ROOT_API_URL:?}
      SYNC_INTERVAL_HOURS: ${BACKEND_AUTOUPDATE:?}
      BOT_WEBHOOK_URL: ${BOT_WEBHOOK_URL:?}
      PORT: ${BACKEND_PORT:-8080}
    networks:
      - backend_net
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    container_name: lanpass_frontend
    build:
      context: ./frontend
      args:
        VITE_APP_PHONE: ${PHONE:?}
        BACKEND_DOMAIN: localhost
        BACKEND_PORT: 8080
        API_PATTERN: api
    networks:
      - frontend_net
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    container_name: lanpass_nginx
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  tgbot:
    container_name: lanpass_tgbot
    build:
      context: ./tgbot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?}
      CHAT_IDS: ${CHAT_IDS:?}
      ADMIN_LOGIN: ${ADMIN_LOGIN:?}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      SECRET: ${SECRET:?} 
      API_HOST: backend
      API_PORT: ${BACKEND_PORT:-8080}
    networks:
      - backend_net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres:
  pgadmin:
