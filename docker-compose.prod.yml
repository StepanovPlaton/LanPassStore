services:
  backend:
    image: ghcr.io/${GHCR_REPOSITORY?-set-in-.env}-backend:latest

  frontend:
    image: ghcr.io/${GHCR_REPOSITORY?-set-in-.env}-frontend:latest

  nginx:
    environment:
      - DOMAIN=${DOMAIN:?}
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/templates/nginx.conf.template:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: on-failure 
    command: >-
      certonly --webroot -w /var/www/certbot
      -d ${DOMAIN:?}
      --email ${LETSENCRYPT_EMAIL:?}
      --agree-tos
      --non-interactive
      --keep-until-expiring

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 300

volumes:
  certbot-etc:
  certbot-www: